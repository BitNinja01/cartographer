<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartographer — Course Tagger</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('../fonts/JetBrainsMono/JetBrainsMonoNLNerdFontMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('../fonts/JetBrainsMono/JetBrainsMonoNLNerdFontMono-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('../fonts/JetBrainsMono/JetBrainsMonoNLNerdFontMono-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('../fonts/JetBrainsMono/JetBrainsMonoNLNerdFontMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --bg:      oklch(14% 0.010 240);
      --surface: oklch(18% 0.012 240);
      --surface-elevated: oklch(22% 0.014 240);
      --fg:      oklch(94% 0.006 240);
      --muted:   oklch(64% 0.010 240);
      --border:  oklch(32% 0.015 240);
      --accent:  oklch(68% 0.16 145);
      --accent-hover: oklch(72% 0.18 145);
      --danger: oklch(64% 0.20 25);

      --font-body: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-body);
      display: flex;
      height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-variant-numeric: tabular-nums;
    }

    #map {
      flex: 1;
      background: var(--surface);
    }

    #map .leaflet-tile-pane {
      filter: grayscale(1);
    }

    #sidebar {
      width: 360px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--fg);
      font-family: var(--font-body);
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      color: var(--muted);
      padding: 16px 20px 10px;
      font-family: var(--font-mono);
    }

    #hole-selector {
      padding: 12px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #hole-label {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
      font-family: var(--font-mono);
    }

    .hole-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #btn-prev-hole, #btn-next-hole {
      background: var(--surface-elevated);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      padding: 6px 10px;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }

    #btn-prev-hole:hover, #btn-next-hole:hover {
      background: var(--border);
      color: var(--fg);
      border-color: var(--muted);
    }

    #current-hole {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      min-width: 36px;
      text-align: center;
      font-family: var(--font-mono);
    }

    .invalid { color: var(--muted) !important; }

    #type-filters {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #type-filters input[type=checkbox] {
      display: none;
    }

    #type-filters label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 6px;
      transition: all 0.15s;
      font-family: var(--font-mono);
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      opacity: 0.4;
    }

    #type-filters label:hover {
      opacity: 0.7;
      border-color: var(--muted);
    }

    #type-filters input[type=checkbox]:checked + label,
    #type-filters label:has(input:checked) {
      opacity: 1;
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    #type-filters input[type=checkbox]:checked + label:hover,
    #type-filters label:has(input:checked):hover {
      opacity: 1;
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      font-family: var(--font-mono);
      text-transform: lowercase;
    }

    .type-fairway { background: oklch(58% 0.14 145); }
    .type-green { background: oklch(48% 0.12 165); }
    .type-bunker { background: oklch(54% 0.08 60); }
    .type-water { background: oklch(58% 0.16 240); }
    .type-rough { background: oklch(52% 0.12 140); }
    .type-tee { background: oklch(48% 0.02 240); }
    .type-path { background: oklch(64% 0.14 80); }

    #feature-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .feature-item {
      padding: 12px;
      margin-bottom: 2px;
      border-radius: 6px;
      background: var(--surface-elevated);
      cursor: pointer;
      font-size: 13px;
      border: 1px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
    }

    .feature-item:hover {
      background: var(--border);
      border-color: var(--muted);
    }

    .feature-item.assigned {
      opacity: 0.7;
      background: oklch(18% 0.06 145);
      border-color: oklch(32% 0.10 145);
    }

    .feature-item.assigned:hover {
      opacity: 0.85;
      border-color: var(--accent);
    }

    .feature-item.course-wide {
      opacity: 0.6;
      cursor: default;
      border-style: dashed;
    }

    .feature-item.course-wide:hover {
      background: var(--surface-elevated);
      border-color: transparent;
    }

    .hole-badge {
      display: inline-block;
      padding: 3px 9px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .course-wide-badge {
      display: inline-block;
      padding: 3px 9px;
      background: oklch(54% 0.12 240);
      color: white;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .feature-meta {
      color: var(--muted);
      font-size: 12px;
      margin-left: auto;
    }

    #controls {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--surface);
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }

    #btn-save {
      background: var(--accent);
      color: var(--bg);
    }

    #btn-save:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }



    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <header>
    <h1 id="course-title"></h1>
  </header>

  <div id="hole-selector">
    <span id="hole-label">Current hole</span>
    <div class="hole-nav">
      <button id="btn-prev-hole" title="Previous hole">◀</button>
      <span id="current-hole">1</span>
      <button id="btn-next-hole" title="Next hole">▶</button>
    </div>
  </div>

  <div class="section-label">Filter by type</div>
  <div id="type-filters">
    <label>
      <input type="checkbox" checked onchange="toggleFilter('fairway', this.checked)">
      fairway
    </label>
    <label>
      <input type="checkbox" checked onchange="toggleFilter('green', this.checked)">
      green
    </label>
    <label>
      <input type="checkbox" checked onchange="toggleFilter('bunker', this.checked)">
      bunker
    </label>
    <label>
      <input type="checkbox" checked onchange="toggleFilter('tee', this.checked)">
      tee
    </label>
  </div>

  <div class="section-label">Features</div>
  <div id="feature-list"></div>

  <div id="controls">
    <button id="btn-save">Save &amp; Close</button>
  </div>
</div>

<script>
  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const typeColours = {
    fairway: '#4CAF50', green: '#00796B', bunker: '#8D6E63',
    water: '#1565C0', waterway: '#1565C0', rough: '#228B22', tee: '#555', path: '#FF8F00'
  };

  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

  let featureAssignments = {};
  const activeFilters = new Set(['fairway','green','bunker','water','waterway','path','tee']);
  let allFeatures = [];

  function toggleFilter(type, visible) {
    visible ? activeFilters.add(type) : activeFilters.delete(type);
    Object.entries(layers).forEach(([id, layer]) => {
      if (layer.feature && layer.feature.properties.type === type) {
        const isAssigned = !!featureAssignments[id];
        if (visible && !isAssigned) {
          map.addLayer(layer);
        } else {
          map.removeLayer(layer);
        }
      }
    });
    renderFeatureList(allFeatures);
  }

  let currentHole = 1;

  function setCurrentHole(hole) {
    currentHole = hole;
    const el = document.getElementById('current-hole');
    el.textContent = hole >= 1 && hole <= 18 ? hole : '—';
    el.classList.toggle('invalid', hole < 1 || hole > 18);
  }

  document.getElementById('btn-prev-hole').onclick = () => {
    setCurrentHole(Math.max(1, currentHole - 1));
  };
  document.getElementById('btn-next-hole').onclick = () => {
    setCurrentHole(Math.min(18, currentHole + 1));
  };

  setCurrentHole(1);

  const layers = {};

  fetch('/api/features')
    .then(r => r.json())
    .then(data => {
      document.getElementById('course-title').textContent = data.course_name || 'Cartographer';

      (data.features || []).forEach(f => {
        const hole = f.properties.hole;
        if (hole && hole >= 1 && hole <= 18) {
          featureAssignments[f.properties.osm_id] = hole;
        }
      });

      if (data.bounds) {
        map.fitBounds([
          [data.bounds.minlat, data.bounds.minlon],
          [data.bounds.maxlat, data.bounds.maxlon],
        ], {padding: [30, 30]});
      }

      const geojsonLayer = L.geoJSON(data, {
        style: feature => {
          const ftype = feature.properties.type;
          const courseWide = ftype === 'water' || ftype === 'waterway' || ftype === 'path';
          return {
            color: typeColours[ftype] || '#888',
            fillColor: typeColours[ftype] || '#888',
            fillOpacity: 0.4,
            weight: 2,
            interactive: !courseWide,
          };
        },
        pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
          radius: 6,
          fillColor: typeColours[feature.properties.type] || '#888',
          color: '#000', weight: 1, fillOpacity: 0.8,
        }),
        onEachFeature: (feature, layer) => {
          const id = feature.properties.osm_id;
          if (feature.properties.type === 'unclassified') {
            // Don't render unclassified features on the map at all
            return;
          }
          layers[id] = layer;
          layer.on('click', e => {
            const ftype = feature.properties.type;
            if (ftype === 'water' || ftype === 'waterway' || ftype === 'path') return;  // course-wide, not per-hole

            if (featureAssignments[id]) {
              delete featureAssignments[id];
              map.addLayer(layer);
              renderFeatureList(allFeatures);
              return;
            }
            if (currentHole >= 1 && currentHole <= 18) {
              featureAssignments[id] = currentHole;
              map.removeLayer(layer);
              renderFeatureList(allFeatures);
            }
          });
        }
      }).addTo(map);

      Object.entries(featureAssignments).forEach(([id]) => {
        if (layers[id]) {
          map.removeLayer(layers[id]);
        }
      });
      allFeatures = data.features;
      renderFeatureList(allFeatures);
    });

  function renderFeatureList(features) {
    const list = document.getElementById('feature-list');
    list.innerHTML = '';
    features.forEach(f => {
      const id = f.properties.osm_id;
      const type = f.properties.type;
      if (!activeFilters.has(type)) return;
      const hole = featureAssignments[id];
      const div = document.createElement('div');
      const isCourseWide = (type === 'water' || type === 'waterway' || type === 'path');
      if (isCourseWide) return;  // auto-injected to all holes — don't clutter the list

      div.className = 'feature-item' + (hole ? ' assigned' : '');
      
      const holeBadge = hole ? `<span class="hole-badge">H${hole}</span>` : '';

      div.innerHTML = `
        ${holeBadge}
        <span class="type-badge type-${type}">${type}</span>
        <span class="feature-meta">#${id}</span>
      `;

      div.onclick = () => {
          if (hole) {
            delete featureAssignments[id];
            if (layers[id]) map.addLayer(layers[id]);
            renderFeatureList(allFeatures);
          } else {
            if (currentHole >= 1 && currentHole <= 18) {
              featureAssignments[id] = currentHole;
              if (layers[id]) map.removeLayer(layers[id]);
              renderFeatureList(allFeatures);
            }
            if (layers[id]) {
              map.setView(layers[id].getBounds ? layers[id].getBounds().getCenter() : layers[id].getLatLng(), 18);
            }
          }
        };
      list.appendChild(div);
    });
  }


  document.getElementById('btn-save').onclick = () => {
    const holes = {};
    for (let h = 1; h <= 18; h++) {
      holes[String(h)] = {fairway:[], green:[], bunkers:[], tee_boxes:{}, water:[], waterways:[], paths:[], rough_boundary:[]};
    }
    fetch('/api/features').then(r => r.json()).then(data => {
      data.features.forEach(f => {
        const id = f.properties.osm_id;
        const geom = f.geometry;
        const type = f.properties.type;
        const hole = featureAssignments[id];

        // Water and paths are course-wide — auto-distribute to all 18 holes
        if (type === 'water' || type === 'waterway' || type === 'path') {
          const targetHoles = Object.keys(holes);
          if (geom.type === 'Polygon' && type === 'water') {
            const ring = geom.coordinates[0].map(c => [c[1], c[0]]);
            targetHoles.forEach(hk => holes[hk].water.push(ring));
          } else if (geom.type === 'LineString' && type === 'waterway') {
            const line = geom.coordinates.map(c => [c[1], c[0]]);
            targetHoles.forEach(hk => holes[hk].waterways.push(line));
          } else if (geom.type === 'LineString' && type === 'path') {
            const line = geom.coordinates.map(c => [c[1], c[0]]);
            targetHoles.forEach(hk => holes[hk].paths.push(line));
          }
          return;
        }

        if (!hole) return;
        const hk = String(hole);
        if (geom.type === 'Point') {
          const teeColour = f.properties.tags?.colour || f.properties.tags?.color || 'white';
          holes[hk].tee_boxes[teeColour] = [geom.coordinates[1], geom.coordinates[0]];
        } else if (geom.type === 'Polygon') {
          const ring = geom.coordinates[0].map(c => [c[1], c[0]]);
          if (type === 'fairway') holes[hk].fairway.push(ring);
          else if (type === 'green') holes[hk].green.push(ring);
          else if (type === 'bunker') holes[hk].bunkers.push(ring);
          else if (type === 'water') holes[hk].water.push(ring);
          else if (type === 'rough') holes[hk].rough_boundary.push(ring);
          else if (type === 'tee') holes[hk].rough_boundary.push(ring);
        } else if (geom.type === 'LineString') {
          const line = geom.coordinates.map(c => [c[1], c[0]]);
          if (type === 'path') holes[hk].paths.push(line);
          else if (type === 'waterway') holes[hk].waterways.push(line);
        }
      });

      fetch('/api/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({scale: {pixels_per_yard: 1.0}, holes}),
      }).then(() => {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--font-body);font-size:18px;color:var(--accent);">Saved! You can close this tab.</div>';
      });
    });
  };
</script>
</body>
</html>
