<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartographer — Course Tagger</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; display: flex; height: 100vh; background: #1a1a1a; color: #eee; }
    #map { flex: 1; }
    #sidebar {
      width: 300px; background: #252525; display: flex; flex-direction: column;
      border-left: 1px solid #444; overflow: hidden;
    }
    #sidebar h2 { padding: 12px 16px; font-size: 14px; background: #333; border-bottom: 1px solid #444; }
    #feature-list { flex: 1; overflow-y: auto; padding: 8px; }
    .feature-item {
      padding: 8px 10px; margin-bottom: 4px; border-radius: 4px;
      background: #333; cursor: pointer; font-size: 12px; border: 1px solid #444;
    }
    .feature-item:hover { background: #3a3a3a; }
    .feature-item.assigned { opacity: 0.6; border-color: #4CAF50; background: #2a3a2a; }
    .feature-item .type-badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; margin-right: 6px; color: white;
    }
    .type-fairway { background: #4CAF50; }
    .type-green { background: #00796B; }
    .type-bunker { background: #8D6E63; }
    .type-water { background: #1565C0; }
    .type-rough { background: #228B22; }
    .type-tee { background: #555; }
    .type-unclassified { background: #888; }
    .type-path { background: #FF8F00; }
    #controls { padding: 12px; border-top: 1px solid #444; display: flex; flex-direction: column; gap: 8px; }
    button {
      padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer;
      font-family: monospace; font-size: 12px;
    }
    #btn-save { background: #4CAF50; color: white; }
    #btn-save:hover { background: #388E3C; }
    #btn-scale { background: #1565C0; color: white; }
    #btn-scale:hover { background: #0D47A1; }
    #scale-info { font-size: 11px; color: #aaa; }

    #type-filters { padding: 8px 16px; border-bottom: 1px solid #444; }
    #type-filters label { display: inline-flex; align-items: center; gap: 4px; margin-right: 10px; font-size: 11px; cursor: pointer; }
    #type-filters input[type=checkbox] { accent-color: #4CAF50; }
    .feature-item.hidden { display: none; }
    #hole-selector { padding: 8px 16px; border-bottom: 1px solid #444; display: flex; align-items: center; gap: 8px; }
    #hole-label { font-size: 11px; color: #aaa; }
    #current-hole { font-size: 18px; font-weight: bold; color: #4CAF50; min-width: 24px; text-align: center; }
    #btn-prev-hole, #btn-next-hole { background: #333; color: #aaa; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 16px; padding: 2px 8px; }
    #btn-prev-hole:hover, #btn-next-hole:hover { background: #444; color: white; }
  </style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <h2 id="course-title">Cartographer</h2>
  <div id="type-filters">
    <label><input type="checkbox" checked onchange="toggleFilter('fairway', this.checked)"> <span class="type-badge type-fairway">fairway</span></label>
    <label><input type="checkbox" checked onchange="toggleFilter('green', this.checked)"> <span class="type-badge type-green">green</span></label>
    <label><input type="checkbox" checked onchange="toggleFilter('bunker', this.checked)"> <span class="type-badge type-bunker">bunker</span></label>
    <label><input type="checkbox" checked onchange="toggleFilter('water', this.checked)"> <span class="type-badge type-water">water</span></label>
    <label><input type="checkbox" checked onchange="toggleFilter('path', this.checked)"> <span class="type-badge type-path">path</span></label>
    <label><input type="checkbox" checked onchange="toggleFilter('tee', this.checked)"> <span class="type-badge type-tee">tee</span></label>
    <label><input type="checkbox" checked onchange="toggleFilter('unclassified', this.checked)"> <span class="type-badge type-unclassified">other</span></label>
  </div>
  <div id="hole-selector">
    <span id="hole-label">Tagging hole:</span>
    <button id="btn-prev-hole" title="Previous hole">◀</button>
    <span id="current-hole">1</span>
    <button id="btn-next-hole" title="Next hole">▶</button>
  </div>
  <div id="feature-list"></div>
  <div id="controls">
    <div id="scale-info">Scale: not set</div>
    <button id="btn-scale">Set Scale (2-point)</button>
    <div id="scale-input-area" style="display:none;">
      <input id="distance-input" type="number" min="1" max="600" placeholder="Distance in yards"
             style="width:100%;padding:6px;background:#333;border:1px solid #555;color:white;font-family:monospace;border-radius:3px;font-size:14px;margin-top:8px;" />
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button id="btn-confirm-scale" style="flex:1;background:#1565C0;color:white;">Confirm</button>
        <button id="btn-cancel-scale-2" style="flex:1;background:#555;color:white;">Cancel</button>
      </div>
    </div>
    <button id="btn-save">Save &amp; Close</button>
  </div>
</div>

<script>
  const map = L.map('map').setView([0, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const typeColours = {
    fairway: '#4CAF50', green: '#00796B', bunker: '#8D6E63',
    water: '#1565C0', rough: '#228B22', tee: '#555', unclassified: '#888', path: '#FF8F00'
  };

  let featureAssignments = {};
  let scaleData = null;
  const activeFilters = new Set(['fairway','green','bunker','water','path','tee','unclassified']);
  let allFeatures = [];

  function toggleFilter(type, visible) {
    visible ? activeFilters.add(type) : activeFilters.delete(type);
    Object.entries(layers).forEach(([id, layer]) => {
      if (layer.feature && layer.feature.properties.type === type) {
        const isAssigned = !!featureAssignments[id];
        if (visible && !isAssigned) {
          map.addLayer(layer);
        } else {
          map.removeLayer(layer);
        }
      }
    });
    renderFeatureList(allFeatures);
  }

  let currentHole = 1;

  function setCurrentHole(hole) {
    currentHole = hole;
    const el = document.getElementById('current-hole');
    el.textContent = hole >= 1 && hole <= 18 ? hole : '—';
    el.style.color = (hole >= 1 && hole <= 18) ? '#4CAF50' : '#888';
  }

  document.getElementById('btn-prev-hole').onclick = () => {
    setCurrentHole(Math.max(1, currentHole - 1));
  };
  document.getElementById('btn-next-hole').onclick = () => {
    setCurrentHole(Math.min(18, currentHole + 1));
  };

  setCurrentHole(1);

  let scaleMode = false;
  let scalePoints = [];
  let scaleMarkers = [];
  const layers = {};

  fetch('/api/features')
    .then(r => r.json())
    .then(data => {
      document.getElementById('course-title').textContent = data.course_name || 'Cartographer';

      const existing = data.existing || {};
      if (existing.scale) {
        scaleData = existing.scale;
        updateScaleInfo();
      }

      (data.features || []).forEach(f => {
        const hole = f.properties.hole;
        if (hole && hole >= 1 && hole <= 18) {
          featureAssignments[f.properties.osm_id] = hole;
        }
      });

      const geojsonLayer = L.geoJSON(data, {
        style: feature => ({
          color: typeColours[feature.properties.type] || '#888',
          fillColor: typeColours[feature.properties.type] || '#888',
          fillOpacity: 0.4,
          weight: 2,
        }),
        pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
          radius: 6,
          fillColor: typeColours[feature.properties.type] || '#888',
          color: '#000', weight: 1, fillOpacity: 0.8,
        }),
        onEachFeature: (feature, layer) => {
          const id = feature.properties.osm_id;
          layers[id] = layer;
          layer.on('click', e => {
            if (scaleMode) return;
            
            if (featureAssignments[id]) {
              delete featureAssignments[id];
              map.addLayer(layer);
              renderFeatureList(allFeatures);
              return;
            }
            if (currentHole >= 1 && currentHole <= 18) {
              featureAssignments[id] = currentHole;
              map.removeLayer(layer);
              renderFeatureList(allFeatures);
            }
          });
        }
      }).addTo(map);

      map.fitBounds(geojsonLayer.getBounds().pad(0.1));
      Object.entries(featureAssignments).forEach(([id]) => {
        if (layers[id]) {
          map.removeLayer(layers[id]);
        }
      });
      allFeatures = data.features;
      renderFeatureList(allFeatures);
      updateScaleInfo();
    });

  function renderFeatureList(features) {
    const list = document.getElementById('feature-list');
    list.innerHTML = '';
    features.forEach(f => {
      const id = f.properties.osm_id;
      const type = f.properties.type;
      if (!activeFilters.has(type)) return;
      const hole = featureAssignments[id];
      const div = document.createElement('div');
      div.className = 'feature-item' + (hole ? ' assigned' : '');
      const holeBadge = hole ? `<span style="display:inline-block;padding:1px 8px;background:#4CAF50;color:white;border-radius:3px;font-size:10px;margin-right:6px;">H${hole}</span>` : '';
      div.innerHTML = `${holeBadge}<span class="type-badge type-${type}">${type}</span> <small style="color:#888">#${id}</small>`;
      div.onclick = () => {
        if (hole) {
          delete featureAssignments[id];
          if (layers[id]) {
            map.addLayer(layers[id]);
          }
          renderFeatureList(allFeatures);
        } else {
          if (currentHole >= 1 && currentHole <= 18) {
            featureAssignments[id] = currentHole;
            if (layers[id]) {
              map.removeLayer(layers[id]);
            }
            renderFeatureList(allFeatures);
          }
          if (layers[id]) {
            map.setView(layers[id].getBounds ? layers[id].getBounds().getCenter() : layers[id].getLatLng(), 18);
          }
        }
      };
      list.appendChild(div);
    });
  }


  // Scale tool
  document.getElementById('btn-scale').onclick = () => {
    if (scaleMode) {
      scaleMode = false;
      scaleMarkers.forEach(m => map.removeLayer(m));
      scaleMarkers = [];
      scalePoints = [];
      document.getElementById('btn-scale').textContent = 'Set Scale (2-point)';
      document.getElementById('scale-input-area').style.display = 'none';
      return;
    }
    scaleMode = true;
    scalePoints = [];
    scaleMarkers.forEach(m => map.removeLayer(m));
    scaleMarkers = [];
    document.getElementById('btn-scale').textContent = 'Choosing point 1...';
    document.getElementById('scale-input-area').style.display = 'none';
  };

  map.on('click', e => {
    if (!scaleMode) return;
    if (scalePoints.length >= 2) return;
    scalePoints.push([e.latlng.lat, e.latlng.lng]);
    const marker = L.circleMarker(e.latlng, {radius: 6, color: '#1565C0', fillColor: '#1565C0', fillOpacity: 1}).addTo(map);
    scaleMarkers.push(marker);
    if (scalePoints.length === 1) {
      document.getElementById('btn-scale').textContent = 'Choosing point 2...';
    } else if (scalePoints.length === 2) {
      document.getElementById('btn-scale').textContent = 'Set Scale (active)';
      document.getElementById('scale-input-area').style.display = 'block';
      document.getElementById('distance-input').value = '';
      document.getElementById('distance-input').focus();
    }
  });

  document.getElementById('btn-confirm-scale').onclick = () => {
    const dist = parseFloat(document.getElementById('distance-input').value);
    if (dist > 0 && scalePoints.length === 2) {
      const p1 = map.latLngToContainerPoint(L.latLng(scalePoints[0][0], scalePoints[0][1]));
      const p2 = map.latLngToContainerPoint(L.latLng(scalePoints[1][0], scalePoints[1][1]));
      const pixelDist = Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2);
      const ppy = pixelDist / dist;
      scaleData = {
        pixels_per_yard: ppy,
        reference_point_a: scalePoints[0],
        reference_point_b: scalePoints[1],
        reference_distance_yards: dist,
      };
      scaleMode = false;
      scaleMarkers.forEach(m => map.removeLayer(m));
      scaleMarkers = [];
      scalePoints = [];
      document.getElementById('btn-scale').textContent = 'Set Scale (2-point)';
      document.getElementById('scale-input-area').style.display = 'none';
      updateScaleInfo();
    }
  };

  document.getElementById('btn-cancel-scale-2').onclick = () => {
    scaleMode = false;
    scaleMarkers.forEach(m => map.removeLayer(m));
    scaleMarkers = [];
    scalePoints = [];
    document.getElementById('btn-scale').textContent = 'Set Scale (2-point)';
    document.getElementById('scale-input-area').style.display = 'none';
  };

  function updateScaleInfo() {
    const el = document.getElementById('scale-info');
    if (scaleData) {
      el.textContent = `Scale: ${scaleData.pixels_per_yard.toFixed(2)} px/yd`;
      el.style.color = '#4CAF50';
    } else {
      el.textContent = 'Scale: not set';
      el.style.color = '#aaa';
    }
  }

  document.getElementById('btn-save').onclick = () => {
    if (!scaleData) {
      alert('Please set the scale before saving (click "Set Scale").');
      return;
    }

    const holes = {};
    fetch('/api/features').then(r => r.json()).then(data => {
      data.features.forEach(f => {
        const id = f.properties.osm_id;
        const hole = featureAssignments[id];
        if (!hole) return;
        const hk = String(hole);
        if (!holes[hk]) holes[hk] = {fairway:[], green:[], bunkers:[], tee_boxes:{}, water:[], paths:[], rough_boundary:[]};
        const type = f.properties.type;
        const geom = f.geometry;
        if (geom.type === 'Point') {
          const teeColour = f.properties.tags?.colour || f.properties.tags?.color || 'white';
          holes[hk].tee_boxes[teeColour] = [geom.coordinates[1], geom.coordinates[0]];
        } else if (geom.type === 'Polygon') {
          const ring = geom.coordinates[0].map(c => [c[1], c[0]]);
          if (type === 'fairway') holes[hk].fairway.push(ring);
          else if (type === 'green') holes[hk].green.push(ring);
          else if (type === 'bunker') holes[hk].bunkers.push(ring);
          else if (type === 'water') holes[hk].water.push(ring);
          else if (type === 'rough') holes[hk].rough_boundary.push(ring);
          else if (type === 'tee') holes[hk].rough_boundary.push(ring);
        } else if (geom.type === 'LineString') {
          const line = geom.coordinates.map(c => [c[1], c[0]]);
          if (type === 'path') holes[hk].paths.push(line);
        }
      });

      fetch('/api/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({scale: scaleData, holes}),
      }).then(() => {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;font-size:18px;color:#4CAF50;">Saved! You can close this tab.</div>';
      });
    });
  };
</script>
</body>
</html>
